<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calibration Test — Risk Culture Builders</title>
<style>
  :root {
    --navy: #1E3A5F;
    --navy-dark: #152A47;
    --gold: #C9A84C;
    --gold-light: #E5C97A;
    --bg: #F4F7FB;
    --bg-card: #FFFFFF;
    --bg-surface: #EBF0F8;
    --text: #1A2A3A;
    --text-muted: #5A6A7A;
    --text-hint: #8A9AAA;
    --border: #D0DCE8;
    --border-strong: #B0C0D0;
    --green: #0F6E56;
    --green-bg: #E1F5EE;
    --amber: #854F0B;
    --amber-bg: #FAEEDA;
    --red: #A32D2D;
    --red-bg: #FCEBEB;
    --blue-fill: #B5D4F4;
    --blue-text: #0C447C;
    --purple-fill: #EEEDFE;
    --purple-text: #3C3489;
    --teal-fill: #E1F5EE;
    --teal-text: #085041;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: var(--navy);
    padding: 0 2rem;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-bar {
    width: 4px;
    height: 28px;
    background: var(--gold);
    border-radius: 2px;
  }
  .logo-text {
    font-size: 13px;
    font-weight: 600;
    color: #FFFFFF;
    letter-spacing: .02em;
  }
  .logo-sub {
    font-size: 11px;
    color: #9BB5D0;
    font-weight: 400;
    letter-spacing: .03em;
  }
  .header-tag {
    font-size: 11px;
    color: #9BB5D0;
    letter-spacing: .05em;
    text-transform: uppercase;
  }
  main {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 3rem 1.5rem;
  }
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem;
    width: 100%;
    max-width: 620px;
  }
  h1 {
    font-size: 24px;
    font-weight: 600;
    color: var(--navy);
    margin-bottom: .5rem;
    line-height: 1.3;
  }
  h2 {
    font-size: 20px;
    font-weight: 600;
    color: var(--navy);
    margin-bottom: 1.25rem;
  }
  p { line-height: 1.7; }
  .intro-lead {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.7;
    margin-bottom: 1.25rem;
  }
  .info-box {
    background: var(--bg-surface);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    margin-bottom: 1.5rem;
  }
  .info-box-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--navy);
    margin-bottom: 5px;
  }
  .info-box-text {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.65;
  }
  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 1.5rem;
  }
  .stat-card {
    background: var(--bg-surface);
    border-radius: 8px;
    padding: 12px 14px;
  }
  .stat-label {
    font-size: 11px;
    color: var(--text-hint);
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-bottom: 4px;
  }
  .stat-value {
    font-size: 22px;
    font-weight: 600;
    color: var(--navy);
  }
  .note-text {
    font-size: 12px;
    color: var(--text-hint);
    margin-bottom: 1.25rem;
  }
  .btn-primary {
    background: var(--navy);
    color: #FFFFFF;
    border: none;
    padding: 11px 26px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: .01em;
    transition: background .15s;
  }
  .btn-primary:hover { background: var(--navy-dark); }
  .btn-secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border-strong);
    padding: 11px 22px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    transition: background .15s;
  }
  .btn-secondary:hover { background: var(--bg-surface); }
  .prog-label {
    font-size: 12px;
    color: var(--text-hint);
    margin-bottom: 5px;
  }
  .pbar-bg {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 1.75rem;
  }
  .pbar-fill {
    height: 4px;
    background: var(--gold);
    border-radius: 2px;
    transition: width .35s ease;
  }
  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 1rem;
    letter-spacing: .02em;
  }
  .badge-gk { background: var(--purple-fill); color: var(--purple-text); }
  .badge-cyber { background: var(--teal-fill); color: var(--teal-text); }
  .q-text {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.65;
    margin-bottom: 6px;
  }
  .q-hint {
    font-size: 12px;
    color: var(--text-hint);
    margin-bottom: 1.5rem;
  }
  .input-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 8px;
  }
  .input-group label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    margin-bottom: 5px;
  }
  .input-group input {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    font-size: 14px;
    color: var(--text);
    background: var(--bg-card);
    outline: none;
    transition: border-color .15s;
    font-family: inherit;
  }
  .input-group input:focus {
    border-color: var(--navy);
    box-shadow: 0 0 0 3px rgba(30,58,95,.08);
  }
  .err-msg {
    font-size: 12px;
    color: var(--red);
    min-height: 18px;
    margin-bottom: 12px;
  }
  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 1.75rem;
  }
  .metric-card {
    background: var(--bg-surface);
    border-radius: 8px;
    padding: 12px 14px;
  }
  .metric-label {
    font-size: 11px;
    color: var(--text-hint);
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-bottom: 4px;
  }
  .metric-value {
    font-size: 26px;
    font-weight: 700;
    color: var(--navy);
  }
  .metric-value.good { color: var(--green); }
  .metric-value.warn { color: var(--amber); }
  .metric-value.bad { color: var(--red); }
  .sec-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--text-hint);
    margin-bottom: 10px;
  }
  .bar-wrap { margin-bottom: 1.75rem; }
  .bar-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }
  .bar-lbl {
    font-size: 12px;
    color: var(--text-muted);
    width: 76px;
    text-align: right;
    flex-shrink: 0;
  }
  .bar-track {
    flex: 1;
    height: 24px;
    background: var(--bg-surface);
    border-radius: 5px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 5px;
    display: flex;
    align-items: center;
    padding-left: 10px;
    font-size: 11px;
    font-weight: 600;
    transition: width .7s ease;
  }
  .bf-exp { background: var(--blue-fill); color: var(--blue-text); }
  .bf-good { background: #1D9E75; color: #fff; }
  .bf-warn { background: #BA7517; color: #fff; }
  .bf-bad { background: #C0392B; color: #fff; }
  .result-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 1.75rem;
  }
  .result-item {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
    align-items: start;
  }
  .result-item.hit {
    border-left: 3px solid #1D9E75;
    border-radius: 0 10px 10px 0;
  }
  .result-item.miss {
    border-left: 3px solid #C0392B;
    border-radius: 0 10px 10px 0;
  }
  .rq {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 3px;
    line-height: 1.5;
  }
  .rd { font-size: 12px; color: var(--text-muted); }
  .rd strong { font-weight: 600; color: var(--text); }
  .hbadge {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 9px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .hbadge.hit { background: var(--green-bg); color: var(--green); }
  .hbadge.miss { background: var(--red-bg); color: var(--red); }
  .insight-box {
    background: var(--bg-surface);
    border-left: 3px solid var(--gold);
    border-radius: 0 10px 10px 0;
    padding: 1rem 1.25rem;
    margin-bottom: 1.5rem;
  }
  .insight-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--navy);
    margin-bottom: 5px;
  }
  .insight-text {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.65;
  }
  .btn-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  footer {
    text-align: center;
    padding: 1.25rem;
    font-size: 11px;
    color: var(--text-hint);
    border-top: 1px solid var(--border);
    background: var(--bg-card);
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-bar"></div>
    <div>
      <div class="logo-text">Risk Culture Builders</div>
      <div class="logo-sub">riskculturebuilders.com</div>
    </div>
  </div>
  <div class="header-tag">Workshop Tool</div>
</header>

<main>
  <div class="card" id="qroot"></div>
</main>

<footer>
  Risk Culture Builders &nbsp;·&nbsp; RCB Master Coaching Programme &nbsp;·&nbsp; Calibration Exercise
</footer>

<script>
const Qs = [
  {cat:"General knowledge",text:"What is the length of the Nile River?",unit:"km",ans:6650,hint:"Enter values in kilometres"},
  {cat:"General knowledge",text:"What is the operating empty weight of an Airbus A320?",unit:"kg",ans:42600,hint:"Enter values in kilograms"},
  {cat:"General knowledge",text:"What is the total surface area of the African continent?",unit:"million km²",ans:30.4,hint:"Enter values in million km² (e.g. 25.0)"},
  {cat:"General knowledge",text:"What is the official height of Mount Everest?",unit:"metres",ans:8849,hint:"Enter values in metres"},
  {cat:"General knowledge",text:"How many bones does the adult human body have?",unit:"bones",ans:206,hint:"Enter a whole number"},
  {cat:"Cybersecurity",text:"According to the IBM Cost of a Data Breach Report 2023, how many days does it take on average to identify a data breach?",unit:"days",ans:204,hint:"Enter values in days"},
  {cat:"Cybersecurity",text:"According to the Verizon DBIR 2023, what percentage of data breaches involve the human element?",unit:"%",ans:74,hint:"Enter a percentage (e.g. 60)"},
  {cat:"Cybersecurity",text:"What was the average global cost of a data breach in 2023, according to IBM?",unit:"USD million",ans:4.45,hint:"Enter values in USD millions (e.g. 3.5)"},
  {cat:"Cybersecurity",text:"According to the Sophos State of Ransomware 2023 report, what percentage of organisations were hit by a ransomware attack?",unit:"%",ans:66,hint:"Enter a percentage (e.g. 50)"},
  {cat:"Cybersecurity",text:"According to the IBM Cost of a Data Breach Report 2023, how many days on average does it take to contain a breach after it is identified?",unit:"days",ans:73,hint:"Enter values in days"}
];

const answers = [];
const root = document.getElementById('qroot');

function fmt(n) {
  if (n === Math.floor(n) && n >= 1000) return n.toLocaleString();
  if (n === Math.floor(n)) return String(n);
  return n.toFixed(2);
}

function showIntro() {
  root.innerHTML = `
    <h1>Calibration test</h1>
    <p class="intro-lead">For each of the 10 questions, enter a <strong>low</strong> and <strong>high</strong> value such that you are <strong>90% confident</strong> the correct answer falls within your range.</p>
    <div class="info-box">
      <div class="info-box-title">What a well-calibrated person should score</div>
      <div class="info-box-text">If your 90% confidence intervals are accurate, you should capture approximately <strong>9 out of 10</strong> correct answers. Most people score between 4 and 6 — this gap is overconfidence bias making itself visible in real time.</div>
    </div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">Questions</div><div class="stat-value">10</div></div>
      <div class="stat-card"><div class="stat-label">Target score</div><div class="stat-value">9 / 10</div></div>
    </div>
    <p class="note-text">5 general knowledge questions, followed by 5 cybersecurity questions.</p>
    <button class="btn-primary" onclick="showQ(0)">Start test</button>
  `;
}

function showQ(idx) {
  const q = Qs[idx];
  const pct = Math.round((idx / 10) * 100);
  const isCyber = q.cat === 'Cybersecurity';
  root.innerHTML = `
    <div class="prog-label">Question ${idx + 1} of 10</div>
    <div class="pbar-bg"><div class="pbar-fill" style="width:${pct}%"></div></div>
    <span class="badge ${isCyber ? 'badge-cyber' : 'badge-gk'}">${q.cat}</span>
    <p class="q-text">${q.text}</p>
    <p class="q-hint">${q.hint}</p>
    <div class="input-row">
      <div class="input-group">
        <label>Low bound (${q.unit})</label>
        <input type="number" id="lo" step="any" placeholder="lower estimate">
      </div>
      <div class="input-group">
        <label>High bound (${q.unit})</label>
        <input type="number" id="hi" step="any" placeholder="upper estimate">
      </div>
    </div>
    <div class="err-msg" id="err"></div>
    <button class="btn-primary" onclick="submit(${idx})">${idx < 9 ? 'Next question' : 'See results'}</button>
  `;
  const lo = document.getElementById('lo');
  const hi = document.getElementById('hi');
  lo.focus();
  lo.addEventListener('keydown', e => { if (e.key === 'Enter') hi.focus(); });
  hi.addEventListener('keydown', e => { if (e.key === 'Enter') submit(idx); });
}

function submit(idx) {
  const lo = parseFloat(document.getElementById('lo').value);
  const hi = parseFloat(document.getElementById('hi').value);
  const err = document.getElementById('err');
  if (isNaN(lo) || isNaN(hi)) { err.textContent = 'Please enter both values.'; return; }
  if (lo >= hi) { err.textContent = 'Low bound must be less than high bound.'; return; }
  answers[idx] = { lo, hi };
  if (idx < 9) showQ(idx + 1);
  else showResults();
}

function showResults() {
  let hits = 0;
  const items = Qs.map((q, i) => {
    const { lo, hi } = answers[i];
    const hit = lo <= q.ans && q.ans <= hi;
    if (hit) hits++;
    return { q, lo, hi, hit };
  });

  const oc = Math.max(0, Math.round(((9 - hits) / 9) * 100));
  const ocTxt = oc > 0 ? `+${oc}%` : '0%';
  const scoreClass = hits >= 8 ? 'good' : hits >= 5 ? 'warn' : 'bad';
  const ocClass = oc > 30 ? 'bad' : oc > 10 ? 'warn' : 'good';
  const actualW = Math.max(12, Math.round((hits / 10) * 100));
  const actualClass = hits >= 8 ? 'bf-good' : hits >= 5 ? 'bf-warn' : 'bf-bad';

  const interp = hits >= 9
    ? 'Excellent calibration — you are a rare exception. Most people score between 4 and 6 out of 10.'
    : hits >= 7
    ? 'Better than average, but still evidence of overconfidence. A truly well-calibrated person reliably captures 9 out of 10.'
    : hits >= 5
    ? 'A typical result. Your confidence intervals were too narrow — you were more certain than the evidence warranted. This is overconfidence bias in action.'
    : 'A strong overconfidence pattern. Your intervals captured far fewer answers than a 90% confidence level implies — exactly the bias that drives poor risk decisions.';

  const rHTML = items.map(({ q, lo, hi, hit }, i) => `
    <div class="result-item ${hit ? 'hit' : 'miss'}">
      <div>
        <div class="rq">Q${i + 1}. ${q.text.length > 90 ? q.text.slice(0, 90) + '…' : q.text}</div>
        <div class="rd">Your range: ${fmt(lo)} – ${fmt(hi)} ${q.unit} &nbsp;·&nbsp; Answer: <strong>${fmt(q.ans)} ${q.unit}</strong></div>
      </div>
      <span class="hbadge ${hit ? 'hit' : 'miss'}">${hit ? 'Captured' : 'Missed'}</span>
    </div>
  `).join('');

  root.innerHTML = `
    <h2>Your results</h2>
    <div class="metrics-grid">
      <div class="metric-card"><div class="metric-label">Your score</div><div class="metric-value ${scoreClass}">${hits} / 10</div></div>
      <div class="metric-card"><div class="metric-label">Expected</div><div class="metric-value">9 / 10</div></div>
      <div class="metric-card"><div class="metric-label">Overconfidence</div><div class="metric-value ${ocClass}">${ocTxt}</div></div>
    </div>
    <div class="sec-title">Capture rate</div>
    <div class="bar-wrap">
      <div class="bar-row">
        <div class="bar-lbl">Expected</div>
        <div class="bar-track"><div class="bar-fill bf-exp" style="width:90%">9 / 10</div></div>
      </div>
      <div class="bar-row">
        <div class="bar-lbl">Actual</div>
        <div class="bar-track"><div class="bar-fill ${actualClass}" style="width:${actualW}%">${hits} / 10</div></div>
      </div>
    </div>
    <div class="sec-title">Question breakdown</div>
    <div class="result-list">${rHTML}</div>
    <div class="insight-box">
      <div class="insight-title">What this means</div>
      <div class="insight-text">${interp}</div>
    </div>
    <div class="btn-row">
      <button class="btn-primary" onclick="answers.length=0;showIntro()">Run again</button>
      <button class="btn-secondary" onclick="window.print()">Print results</button>
    </div>
  `;
}

showIntro();
</script>
</body>
</html>
